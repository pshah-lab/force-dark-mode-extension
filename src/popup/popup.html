<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="popup">
      <button id="toggle" class="toggle-btn">
        <span class="status-dot"></span>
        <span class="label">Loading…</span>
      </button>

      <div class="engine-group">
        <label class="engine-option">
          <input type="radio" name="engine" value="css" />
          <span>CSS Engine</span>
        </label>

        <label class="engine-option">
          <input type="radio" name="engine" value="invert" />
          <span>Invert Engine</span>
        </label>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
