<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="64" cy="64" r="60" fill="#121212"/>

  <!-- Directional arc (flip hint) -->
  <path
    d="M86 40 A32 32 0 0 0 42 88"
    fill="none"
    stroke="#666666"
    stroke-width="6"
    stroke-linecap="round"
  />

  <!-- Arrow head -->
  <path
    d="M38 86 L46 88 L42 80 Z"
    fill="#666666"
  />

  <!-- Sun (right side) -->
  <circle cx="82" cy="52" r="16" fill="#FFD54F"/>

  <!-- Moon (left side) -->
  <defs>
    <mask id="moon-cut">
      <rect width="128" height="128" fill="white"/>
      <circle cx="46" cy="60" r="10" fill="black"/>
    </mask>
  </defs>

  <circle cx="50" cy="76" r="16" fill="#FFFFFF" mask="url(#moon-cut)"/>
</svg>